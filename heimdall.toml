# Heimdall configuration.
# All values shown are compiled defaults — omit a field to use its default.

[protocol]
dkg_round_timeout_secs = 300
poll_interval_ms = 5000
quorum51_timeout_secs = 300
federation_timeout_secs = 300
leader_timeout_secs = 10000
pegin_collection_window_secs = 5
pegin_poll_interval_ms = 1000

[bitcoin]
network = "testnet4"
fee_rate_sat_per_vb = 1
per_pegout_fee_sat = 1000
federation_csv_blocks = 144
# Depositor refund timelock in BTC blocks (peg-in Taproot refund leaf).
# Production spec is 4320 (~30 days); demo simplification uses 720 (~5 days).
pegin_refund_timeout_blocks = 720
# 32-byte hex seed for the deterministic demo federation key.
# In production this comes from the on-chain treasury oracle.
y_fed_seed_hex = "fefefefefefefefefefefefefefefefefefefefefefefefefefefefefefefefe"
rpc_url = "http://127.0.0.1:48332"   # testnet4 RPC (bitcoind -testnet4)
rpc_user = "bitcoin"
rpc_pass = "bitcoin"
submit = false          # broadcast signed BTC tx to rpc_url (false: binocular relay does it)
# The FROST treasury UTXO is no longer configured locally. The initial (anchor) outpoint lives
# on-chain in the bridge Config UTxO (field 11, set by `binocular deploy-bridge` /
# `binocular update-config`), and the current treasury is resolved by walking the Confirmed
# Treasury Movement chain from that anchor (see [cardano] config_address below). The genesis
# anchor's satoshi value is fetched via rpc_url gettxout.

[cardano]
blockfrost_project_id = "preprodsTOaoyjcqGmy4SOSazxuHkbuXFOOkp8f"
# socket_path = "/run/cardano-node/node.socket"
# network_magic = 1
# pegin_script_address = "addr_test1..."
# pegin_policy_id = "abcdef..."
# TM UTxO address = binocular's TreasuryMovementValidator, parameterized by
# (oracle script hash, config NFT policy, config NFT asset name). STALE/PLACEHOLDER: the value
# below predates the confirmed-chain refactor. After deploying, `binocular info` prints the real
# TM address — paste it here. Until then this address is wrong and confirm-tmtx/relay will not
# find the UTxO.
treasury_address = "addr_test1wq3ywdhmjku42uv2pcmy0dwcnycl2slcnswnfapsg7f5z4cd30duu"
# Marker token (identity NFT riding Unconfirmed→Confirmed); always-ok policy, minted by publish.rs.
treasury_policy_id = "eafdc4d9733275d3e06cfe5fe54a13fff3ba5baa8d65636260537907"
treasury_asset_name = "544d5478"
# mnemonic is loaded from $HEIMDALL_MNEMONIC (see .env, gitignored).
# Setting mnemonic here would override the env var.
submit_oracle = true   # publish oracle-update UTxO to Cardano after signing
oracle_constructor = 0 # 0 = unconfirmed TM tx (Binocular sets 1 on BTC confirmation)
# Bridge Config UTxO locator: its field 11 (initial_btc_treasury_utxo) anchors the Treasury
# Movement chain that query_treasury walks. Values from `binocular deploy-bridge` output.
# config_address = "addr_test1..."                    # the config script address
# config_nft_policy_id = "<config NFT policy, 56 hex>"
# config_nft_asset_name = "424946434647"              # "BIFCFG" hex
# To mint the TM NFT under the REAL TreasuryMovementValidator policy (instead of the always-ok
# scaffold), set tm_script_cbor (from `binocular tm-script`) alongside the config_* fields above,
# AND change treasury_policy_id above to the validator's script hash (the `policy_id` tm-script
# prints, == treasury_address credential) and treasury_asset_name to "" (the validator counts the
# empty-name token). Minting is permissionless: the redeemer proves the posted TM spends the
# current treasury outpoint (config anchor or previous Confirmed TM record's output 0).
# tm_script_cbor = "<cbor from `binocular tm-script`>"

[http]
bind_address = "127.0.0.1"
base_port = 18500

[demo]
min_signers = 2
max_signers = 3
